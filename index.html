<!--
  ============================================================
  画像工学 / 医療画像情報学 サウンドアーカイブ — Google Sites 埋め込み用コード
  ============================================================
  【使い方】
  1. このコード全体をコピー
  2. Google Sites の編集画面で 挿入 → 埋め込み → 「コードを埋め込む」を選択
  3. 貼り付けて「挿入」

  【動画・歌詞の準備】※youtube が空欄の曲は「準備中」表示になります
  下の <script> 内、TRACKS という配列に14曲ぶんのデータがあります。

    youtube   : YouTube動画のID（下記参照）。入れるとサムネイルが表示され、
                クリックでその場に動画プレーヤーが開いて再生されます。
    song      : 曲名（班がつけたタイトル）
    subject   : 単元名（授業テーマ）
    lyrics    : 歌詞のテキスト。入っている曲は「歌詞を見る」で
                再生と連動して自動スクロールする歌詞パネルが開きます。

  ▼ YouTube IDの調べ方（リンクの形ごと）
    https://youtube.com/shorts/XXXXXXXXXXX?...   → 「shorts/」の後ろ XXXXXXXXXXX
    https://youtu.be/XXXXXXXXXXX                 → 「youtu.be/」の後ろ XXXXXXXXXXX
    https://www.youtube.com/watch?v=XXXXXXXXXXX  → 「v=」の後ろ XXXXXXXXXXX
    ※ この11文字ぶんを youtube: "XXXXXXXXXXX" のように入れてください。
    ※ 動画は「限定公開(Unlisted)」または「公開」にしておく必要があります
      （「非公開(Private)」だと学生が再生できません）。

  band（制作班）の欄も、実際の班名に書き換えてOKです。
  ============================================================
-->

  // 埋め込みURLを組み立てる（withApi=true ならJS API連携用のパラメータも付ける）
  function buildEmbedSrc(t, autoplay, withApi) {

    if (autoplay) p.push("autoplay=1");
    if (withApi) {
      p.push("enablejsapi=1");
      if (location.origin && /^https?:/.test(location.origin)) {
        p.push("origin=" + encodeURIComponent(location.origin));
      }
      if (location.href && /^https?:/.test(location.href)) {
        p.push("widget_referrer=" + encodeURIComponent(location.href));
      }
    }
    return "https://www.youtube.com/embed/" + encodeURIComponent(t.youtube) + "?" + p.join("&");

  }

  function showLyricsFor(id) {
    var t = trackById(id);
    if (!t || !t.lyrics) return;
    lyricsTrackId = id;
    lyricsSong.textContent = "♪ " + (t.song || "");
    lyricsSub.textContent = "No." + pad2(t.id) + " " + (t.subject || "") + "／" + t.band;
    renderLyrics(t.lyrics);
    lyricsBody.scrollTop = 0;
    lyricsSheet.classList.add("is-open");
    lyricsSheet.setAttribute("aria-hidden", "false");
  }

  function closeLyricsSheet() {
    lyricsSheet.classList.remove("is-open");
    lyricsSheet.setAttribute("aria-hidden", "true");
    lyricsTrackId = null;
  }

  // 再生位置に合わせて歌詞を比例スクロール
  // （曲全体の進行度 = 歌詞全体のスクロール位置、とみなす近似方式）
  var lyricTimer = null;
  function startLyricSync() {
    stopLyricSync();
    lyricTimer = setInterval(function () {
      if (!autoScroll) return;
      if (lyricsTrackId === null || lyricsTrackId !== currentId) return;
      if (!lyricsSheet.classList.contains("is-open")) return;
      if (Date.now() - userScrollHold < 4000) return;
      if (!ytPlayer || !ytPlayer.getDuration) return;
      var dur = ytPlayer.getDuration();
      var cur = ytPlayer.getCurrentTime ? ytPlayer.getCurrentTime() : 0;
      if (!dur || !isFinite(dur)) return;
      var progress = cur / dur;
      var target = progress * (lyricsBody.scrollHeight - lyricsBody.clientHeight);
      lyricsBody.scrollTop += (target - lyricsBody.scrollTop) * 0.3;
    }, 400);
  }
  function stopLyricSync() {
    if (lyricTimer) { clearInterval(lyricTimer); lyricTimer = null; }
  }

  // 手動でスクロールしたら少しのあいだ自動追従を止める（読み返しできるように）
  ["touchstart", "wheel"].forEach(function (ev) {
    lyricsBody.addEventListener(ev, function () { userScrollHold = Date.now(); }, { passive: true });
  });

  syncToggle.addEventListener("click", function () {
    autoScroll = !autoScroll;
    syncToggle.classList.toggle("is-on", autoScroll);
    syncToggle.textContent = autoScroll ? "♪ 自動スクロール ON" : "自動スクロール OFF";
    if (autoScroll) userScrollHold = 0;
  });

  document.getElementById("iesLyricsClose").addEventListener("click", closeLyricsSheet);

  main.querySelectorAll("[data-lyrics-track]").forEach(function (btn) {
    btn.addEventListener("click", function () {
      var id = Number(btn.getAttribute("data-lyrics-track"));
      showLyricsFor(id);
      // 歌詞を開いた曲がまだ再生されていなければ、その曲を再生開始する
      if (id !== currentId && queueIndex(id) !== -1) {
        loadTrack(id, true);
      }
    });
  });

  // --- 歌詞PDFモーダル ---
  var modal = document.getElementById("iesModal");
  var frame = document.getElementById("iesModalFrame");
  var titleEl = document.getElementById("iesModalTitle");
  var fallback = document.getElementById("iesModalFallback");

  function openLyrics(url, title) {
    frame.src = url;
    fallback.href = url;
    titleEl.textContent = title;
    modal.classList.add("is-open");
    modal.setAttribute("aria-hidden", "false");
  }
  function closeLyrics() {
    modal.classList.remove("is-open");
    modal.setAttribute("aria-hidden", "true");
    frame.src = "";
  }

  main.querySelectorAll("[data-lyrics]").forEach(function (btn) {
    btn.addEventListener("click", function () {
      openLyrics(btn.getAttribute("data-lyrics"), btn.getAttribute("data-title"));
    });
  });
  document.getElementById("iesModalBackdrop").addEventListener("click", closeLyrics);
  document.getElementById("iesModalClose").addEventListener("click", closeLyrics);
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape") {
      closeLyrics();
      closeLyricsSheet();
    }
  });
})();
</script>
